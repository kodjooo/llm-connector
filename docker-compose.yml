services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-connector-gateway
    env_file:
      - .env
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-connector-tests
    env_file:
      - .env
    command: ["pytest", "-q"]
    profiles: ["test"]
